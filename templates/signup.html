<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    height: 100vh;
    background: linear-gradient(135deg, #6a5af9, #8b5cf6);
    display: flex;
    align-items: center;
    justify-content: center;
}

/* Card */
.signup-card {
    width: 420px;
    padding: 35px;
    border-radius: 20px;
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(15px);
    box-shadow: 0 10px 40px rgba(0,0,0,0.2);
    text-align: center;
    color: white;
}

/* Logo */
.logo {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    background: white;
    color: #6a5af9;
    font-weight: bold;
    font-size: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 15px;
}

.logo-video {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    object-fit: cover;
    margin: 0 auto 15px;
    display: block;
    background: white;
    padding: 4px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
}

/* Text */
h2 {
    margin-bottom: 5px;
}

.subtitle {
    font-size: 14px;
    opacity: 0.8;
    margin-bottom: 25px;
}

/* Inputs */
.form-group {
    text-align: left;
    margin-bottom: 15px;
}

.form-group input {
    width: 100%;
    padding: 11px;
    border-radius: 10px;
    border: none;
    outline: none;
    background: rgba(255,255,255,0.2);
    color: white;
}

.form-group input::placeholder {
    color: #ddd;
}

/* Button */
.signup-btn {
    width: 100%;
    padding: 12px;
    border: none;
    border-radius: 12px;
    background: white;
    color: #6a5af9;
    font-weight: 600;
    cursor: pointer;
    transition: 0.3s;
}

.signup-btn:hover {
    transform: scale(1.05);
}

/* Footer */
.footer-link {
    margin-top: 18px;
    font-size: 14px;
}

.footer-link a {
    color: white;
    text-decoration: none;
}

.footer-link a:hover {
    text-decoration: underline;
}
</style>

</head>

<body>

<div class="signup-card">
    <video class="logo-video" autoplay loop muted playsinline>
        <source src="{{ url_for('static', filename='logo.mp4') }}" type="video/mp4">
    </video>

    <h2>Create Account</h2>
    <div class="subtitle">Join DareQuizo</div>

    <form method="POST" action="/signup">
        <div class="form-group">
            <input type="text" placeholder="Full Name" name="name">
        </div>

        <div class="form-group">
            <input type="email" placeholder="Email" name="email">
        </div>

        <div class="form-group">
            <input type="text" placeholder="Username" name="username">
        </div>

        <div class="form-group">
            <input type="password" placeholder="Password" name="password">
        </div>

        <button class="signup-btn">Sign Up</button>
    </form>

    <div class="footer-link">
        Already have an account? <a href="/login">Login</a>
    </div>
</div>

</body>
</html>
